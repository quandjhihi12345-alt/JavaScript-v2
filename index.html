<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Interactive Photo Gallery</title>
    <style>
        /* CSS tạo layout gọn gàng, có hiệu ứng outline rõ ràng khi tab bằng bàn phím */
        #image {
            width: 100%;
            max-width: 600px;
            height: 350px;
            border: 5px solid #2c3e50;
            margin: 20px auto;
            background-color: #7f8c8d;
            background-image: url('');
            background-repeat: no-repeat;
            background-size: cover;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #ffffff;
            font-weight: bold;
            border-radius: 8px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }
        .gallery-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
        }
        .preview {
            width: 150px;
            height: 100px;
            border: 3px solid #2c3e50;
            cursor: pointer;
            border-radius: 4px;
            transition: transform 0.2s;
        }
        /* Cực kỳ quan trọng cho aXe/WAVE: Hiển thị viền highlight khi dùng phím TAB */
        .preview:focus {
            outline: 4px solid #3498db;
            transform: scale(1.05);
        }
    </style>
</head>
<body onload="initializeGallery()">

    <header style="text-align: center;">
        <h1>Accessible Photo Gallery</h1>
        <h2>Interact with Mouse or Keyboard (Tab Key)</h2>
    </header>

    <main>
        <div id="image">
            Hover over an image below or use Tab to display here.
        </div>

        <div class="gallery-container">
            <img class="preview" 
                 src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" 
                 alt="Yosemite Valley Mountain Giant" 
                 onmouseover="upDate(this)" onmouseleave="unDo()"
                 onfocus="upDate(this)" onblur="unDo()">
                 
            <img class="preview" 
                 src="https://images.unsplash.com/photo-1532274402911-5a369e4c4bb5" 
                 alt="Golden Autumn Forest Path" 
                 onmouseover="upDate(this)" onmouseleave="unDo()"
                 onfocus="upDate(this)" onblur="unDo()">
                 
            <img class="preview" 
                 src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" 
                 alt="Beautiful Maldives Sunny Beach" 
                 onmouseover="upDate(this)" onmouseleave="unDo()"
                 onfocus="upDate(this)" onblur="unDo()">

            <img class="preview" 
                 src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05" 
                 alt="Foggy Green Hills Landscape" 
                 onmouseover="upDate(this)" onmouseleave="unDo()"
                 onfocus="upDate(this)" onblur="unDo()">

            <img class="preview" 
                 src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d" 
                 alt="Wooden Bridge in the Woods" 
                 onmouseover="upDate(this)" onmouseleave="unDo()"
                 onfocus="upDate(this)" onblur="unDo()">

            <img class="preview" 
                 src="https://images.unsplash.com/photo-1472214222541-d510753a8707" 
                 alt="Tranquil Green Valley Field" 
                 onmouseover="upDate(this)" onmouseleave="unDo()"
                 onfocus="upDate(this)" onblur="unDo()">
        </div>
    </main>

    <script src="gallery.js"></script>
</body>
</html>
